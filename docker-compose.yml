services:
  gatus:
    container_name: gatus
    build:
      context: ./gatus
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}"
    ports:
      - "8080:8080"
    volumes:
      - ./gatus/config:/app/config
